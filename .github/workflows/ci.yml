name: ci

on:
  pull_request:
  push:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: assistant_test
          POSTGRES_USER: assistant
          POSTGRES_PASSWORD: assistant
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U assistant -d assistant_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://assistant:assistant@127.0.0.1:5432/assistant_test
      REDIS_URL: redis://127.0.0.1:6379/0
      RUN_SERVICE_INTEGRATION: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run alembic upgrade head
      - run: uv run pytest --cov=apps --cov=packages --cov-report=term-missing --cov-fail-under=80
      - run: uv run ruff check .
      - run: uv run mypy .
      - run: uv lock --check
