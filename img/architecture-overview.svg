<svg xmlns="http://www.w3.org/2000/svg" width="1260" height="540" viewBox="0 0 1260 540" role="img">
<style>
  .bg { fill: #f8fafc; }
  .title { font: 700 26px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"Noto Sans CJK SC",sans-serif; fill: #0f172a; }
  .label { font: 700 15px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"Noto Sans CJK SC",sans-serif; fill: #0f172a; }
  .small { font: 400 13px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"Noto Sans CJK SC",sans-serif; fill: #334155; }
  .tiny { font: 400 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"Noto Sans CJK SC",sans-serif; fill: #475569; }
  .blue { stroke: #2563eb; fill: #eff6ff; }
  .green { stroke: #16a34a; fill: #f0fdf4; }
  .orange { stroke: #ea580c; fill: #fff7ed; }
  .purple { stroke: #7c3aed; fill: #f5f3ff; }
  .slate { stroke: #64748b; fill: #f8fafc; }
  .red { stroke: #dc2626; fill: #fef2f2; }
  .box { stroke-width: 1.6; rx: 14; }
  .arrow { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
  .dash { stroke-dasharray: 6 6; }
  .lane { stroke: #cbd5e1; stroke-width: 1.2; stroke-dasharray: 5 5; fill: none; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
  </marker>
</defs>
<rect width="100%" height="100%" class="bg"/>
<text x="32" y="44" text-anchor="start" class="title">整体架构：LangBot 与 Electron 统一进入受控任务系统</text>
<rect x="40" y="90" width="180" height="96" class="box green" rx="14"/>
<text x="130.0" y="118" text-anchor="middle" class="label">入口层</text>
<text x="130.0" y="142" text-anchor="middle" class="small">LangBot Webhook</text>
<text x="130.0" y="160" text-anchor="middle" class="small">Electron /local API</text>
<rect x="270" y="90" width="190" height="96" class="box blue" rx="14"/>
<text x="365.0" y="118" text-anchor="middle" class="label">FastAPI Channels</text>
<text x="365.0" y="142" text-anchor="middle" class="small">intent 路由</text>
<text x="365.0" y="160" text-anchor="middle" class="small">任务 / 审批 / 配置</text>
<rect x="510" y="90" width="190" height="96" class="box purple" rx="14"/>
<text x="605.0" y="118" text-anchor="middle" class="label">领域服务</text>
<text x="605.0" y="142" text-anchor="middle" class="small">Task / Conversation</text>
<text x="605.0" y="160" text-anchor="middle" class="small">Memory / Account</text>
<rect x="750" y="90" width="190" height="96" class="box orange" rx="14"/>
<text x="845.0" y="118" text-anchor="middle" class="label">Celery Worker</text>
<text x="845.0" y="142" text-anchor="middle" class="small">任务执行</text>
<text x="845.0" y="160" text-anchor="middle" class="small">Beat 维护 / 调度</text>
<rect x="990" y="90" width="210" height="96" class="box blue" rx="14"/>
<text x="1095.0" y="118" text-anchor="middle" class="label">Agent Runtime</text>
<text x="1095.0" y="142" text-anchor="middle" class="small">Agent Harness</text>
<text x="1095.0" y="160" text-anchor="middle" class="small">LangGraph Executor</text>
<path d="M220,138 L270,138" class="arrow"/>
<path d="M460,138 L510,138" class="arrow"/>
<path d="M700,138 L750,138" class="arrow"/>
<path d="M940,138 L990,138" class="arrow"/>
<rect x="70" y="260" width="180" height="105" class="box slate" rx="14"/>
<text x="160.0" y="288" text-anchor="middle" class="label">上下文资产</text>
<text x="160.0" y="312" text-anchor="middle" class="small">Conversation</text>
<text x="160.0" y="330" text-anchor="middle" class="small">Knowledge / Memory</text>
<text x="160.0" y="348" text-anchor="middle" class="small">Session Workspace</text>
<rect x="300" y="260" width="180" height="105" class="box slate" rx="14"/>
<text x="390.0" y="288" text-anchor="middle" class="label">规划层</text>
<text x="390.0" y="312" text-anchor="middle" class="small">Agent Profile</text>
<text x="390.0" y="330" text-anchor="middle" class="small">Task Type Router</text>
<text x="390.0" y="348" text-anchor="middle" class="small">Prompt Bootstrap</text>
<rect x="530" y="260" width="180" height="105" class="box slate" rx="14"/>
<text x="620.0" y="288" text-anchor="middle" class="label">执行层</text>
<text x="620.0" y="312" text-anchor="middle" class="small">LangGraph</text>
<text x="620.0" y="330" text-anchor="middle" class="small">Checkpoint</text>
<text x="620.0" y="348" text-anchor="middle" class="small">可恢复事件流</text>
<rect x="760" y="260" width="180" height="105" class="box red" rx="14"/>
<text x="850.0" y="288" text-anchor="middle" class="label">工具治理</text>
<text x="850.0" y="312" text-anchor="middle" class="small">ToolRegistry</text>
<text x="850.0" y="330" text-anchor="middle" class="small">Risk / Approval</text>
<text x="850.0" y="348" text-anchor="middle" class="small">Audit Event</text>
<rect x="990" y="260" width="180" height="105" class="box slate" rx="14"/>
<text x="1080.0" y="288" text-anchor="middle" class="label">观测与回推</text>
<text x="1080.0" y="312" text-anchor="middle" class="small">AgentRun / Logs</text>
<text x="1080.0" y="330" text-anchor="middle" class="small">TaskEvent</text>
<text x="1080.0" y="348" text-anchor="middle" class="small">LangBot Callback</text>
<path d="M250,312 L300,312" class="arrow"/>
<path d="M480,312 L530,312" class="arrow"/>
<path d="M710,312 L760,312" class="arrow"/>
<path d="M940,312 L990,312" class="arrow"/>
<path d="M1080,260 L1080,186" class="arrow dash"/>
<text x="1095" y="228" text-anchor="start" class="tiny">状态、日志和结果回写</text>
<rect x="40" y="430" width="1160" height="72" class="box red" rx="14"/>
<text x="620" y="458" text-anchor="middle" class="label">安全边界：所有用户可观察动作都经过 owner-scoped 校验、风险分级、审批与审计</text>
<text x="620" y="482" text-anchor="middle" class="small">前端、脚本和测试不得绕过后端审批、权限和工具治理策略</text>
</svg>
