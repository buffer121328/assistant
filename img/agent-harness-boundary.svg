<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="500" viewBox="0 0 1280 500" role="img">
<style>
  .bg { fill: #f8fafc; }
  .title { font: 700 26px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"Noto Sans CJK SC",sans-serif; fill: #0f172a; }
  .label { font: 700 15px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"Noto Sans CJK SC",sans-serif; fill: #0f172a; }
  .small { font: 400 13px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"Noto Sans CJK SC",sans-serif; fill: #334155; }
  .tiny { font: 400 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"Noto Sans CJK SC",sans-serif; fill: #475569; }
  .blue { stroke: #2563eb; fill: #eff6ff; }
  .green { stroke: #16a34a; fill: #f0fdf4; }
  .orange { stroke: #ea580c; fill: #fff7ed; }
  .purple { stroke: #7c3aed; fill: #f5f3ff; }
  .slate { stroke: #64748b; fill: #f8fafc; }
  .red { stroke: #dc2626; fill: #fef2f2; }
  .box { stroke-width: 1.6; rx: 14; }
  .arrow { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
  .dash { stroke-dasharray: 6 6; }
  .lane { stroke: #cbd5e1; stroke-width: 1.2; stroke-dasharray: 5 5; fill: none; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
  </marker>
</defs>
<rect width="100%" height="100%" class="bg"/>
<text x="32" y="44" text-anchor="start" class="title">Agent Harness 解耦边界：核心依赖 ports，API 提供适配器</text>
<rect x="60" y="170" width="220" height="96" class="box blue" rx="14"/>
<text x="170.0" y="198" text-anchor="middle" class="label">Agent Harness Core</text>
<text x="170.0" y="222" text-anchor="middle" class="small">runner / loop</text>
<text x="170.0" y="240" text-anchor="middle" class="small">只依赖 ports</text>
<rect x="360" y="90" width="230" height="88" class="box purple" rx="14"/>
<text x="475.0" y="118" text-anchor="middle" class="label">Ports</text>
<text x="475.0" y="142" text-anchor="middle" class="small">TaskLifecyclePort</text>
<text x="475.0" y="160" text-anchor="middle" class="small">ExecutionTracePort</text>
<rect x="360" y="220" width="230" height="88" class="box purple" rx="14"/>
<text x="475.0" y="248" text-anchor="middle" class="label">Context Ports</text>
<text x="475.0" y="272" text-anchor="middle" class="small">ConversationContextPort</text>
<text x="475.0" y="290" text-anchor="middle" class="small">UserLookupPort</text>
<rect x="680" y="155" width="240" height="104" class="box green" rx="14"/>
<text x="800.0" y="183" text-anchor="middle" class="label">API Adapters</text>
<text x="800.0" y="207" text-anchor="middle" class="small">agent_ports.py</text>
<text x="800.0" y="225" text-anchor="middle" class="small">SQLAlchemy / Services</text>
<text x="800.0" y="243" text-anchor="middle" class="small">owner-scoped 校验</text>
<rect x="1000" y="90" width="220" height="88" class="box orange" rx="14"/>
<text x="1110.0" y="118" text-anchor="middle" class="label">Domain Services</text>
<text x="1110.0" y="142" text-anchor="middle" class="small">Task / Memory</text>
<text x="1110.0" y="160" text-anchor="middle" class="small">Conversation / Account</text>
<rect x="1000" y="220" width="220" height="88" class="box orange" rx="14"/>
<text x="1110.0" y="248" text-anchor="middle" class="label">Persistence</text>
<text x="1110.0" y="272" text-anchor="middle" class="small">PostgreSQL / Redis</text>
<text x="1110.0" y="290" text-anchor="middle" class="small">ToolLog / AgentRun</text>
<path d="M280,218 L360,134" class="arrow"/>
<path d="M280,218 L360,264" class="arrow"/>
<path d="M590,134 L680,185" class="arrow"/>
<path d="M590,264 L680,225" class="arrow"/>
<path d="M920,185 L1000,134" class="arrow"/>
<path d="M920,225 L1000,264" class="arrow"/>
<rect x="360" y="370" width="230" height="78" class="box slate" rx="14"/>
<text x="475.0" y="398" text-anchor="middle" class="label">Compat Fallback</text>
<text x="475.0" y="422" text-anchor="middle" class="small">旧直接调用集中隔离</text>
<text x="475.0" y="440" text-anchor="middle" class="small">仅作兼容</text>
<path d="M170,266 L360,410" class="arrow dash"/>
<path d="M590,410 L1000,264" class="arrow dash"/>
</svg>
