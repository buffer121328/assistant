<svg xmlns="http://www.w3.org/2000/svg" width="1140" height="690" viewBox="0 0 1140 690" role="img">
<style>
  .bg { fill: #f8fafc; }
  .title { font: 700 26px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"Noto Sans CJK SC",sans-serif; fill: #0f172a; }
  .label { font: 700 15px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"Noto Sans CJK SC",sans-serif; fill: #0f172a; }
  .small { font: 400 13px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"Noto Sans CJK SC",sans-serif; fill: #334155; }
  .tiny { font: 400 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"Noto Sans CJK SC",sans-serif; fill: #475569; }
  .blue { stroke: #2563eb; fill: #eff6ff; }
  .green { stroke: #16a34a; fill: #f0fdf4; }
  .orange { stroke: #ea580c; fill: #fff7ed; }
  .purple { stroke: #7c3aed; fill: #f5f3ff; }
  .slate { stroke: #64748b; fill: #f8fafc; }
  .red { stroke: #dc2626; fill: #fef2f2; }
  .box { stroke-width: 1.6; rx: 14; }
  .arrow { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
  .dash { stroke-dasharray: 6 6; }
  .lane { stroke: #cbd5e1; stroke-width: 1.2; stroke-dasharray: 5 5; fill: none; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
  </marker>
</defs>
<rect width="100%" height="100%" class="bg"/>
<text x="32" y="44" text-anchor="start" class="title">任务执行时序：当前模块路径下的可审批执行链路</text>
<line x1="80" y1="88" x2="80" y2="660" class="lane"/>
<rect x="2" y="68" width="156" height="58" class="box slate" rx="14"/>
<text x="80.0" y="96" text-anchor="middle" class="label">入口</text>
<text x="80.0" y="120" text-anchor="middle" class="small">channels</text>
<line x1="270" y1="88" x2="270" y2="660" class="lane"/>
<rect x="192" y="68" width="156" height="58" class="box slate" rx="14"/>
<text x="270.0" y="96" text-anchor="middle" class="label">API</text>
<text x="270.0" y="120" text-anchor="middle" class="small">app/api</text>
<line x1="460" y1="88" x2="460" y2="660" class="lane"/>
<rect x="382" y="68" width="156" height="58" class="box slate" rx="14"/>
<text x="460.0" y="96" text-anchor="middle" class="label">领域服务</text>
<text x="460.0" y="120" text-anchor="middle" class="small">domain</text>
<line x1="650" y1="88" x2="650" y2="660" class="lane"/>
<rect x="572" y="68" width="156" height="58" class="box slate" rx="14"/>
<text x="650.0" y="96" text-anchor="middle" class="label">Worker</text>
<text x="650.0" y="120" text-anchor="middle" class="small">workers</text>
<line x1="840" y1="88" x2="840" y2="660" class="lane"/>
<rect x="762" y="68" width="156" height="58" class="box slate" rx="14"/>
<text x="840.0" y="96" text-anchor="middle" class="label">Agent</text>
<text x="840.0" y="120" text-anchor="middle" class="small">agent/core</text>
<line x1="1040" y1="88" x2="1040" y2="660" class="lane"/>
<rect x="962" y="68" width="156" height="58" class="box slate" rx="14"/>
<text x="1040.0" y="96" text-anchor="middle" class="label">工具治理</text>
<text x="1040.0" y="120" text-anchor="middle" class="small">tool_management</text>
<path d="M158,155 L192,155" class="arrow"/>
<text x="175.0" y="145" text-anchor="middle" class="tiny">LangBot webhook 或 /local/* 请求</text>
<path d="M348,205 L382,205" class="arrow"/>
<text x="365.0" y="195" text-anchor="middle" class="tiny">schema/Depends 校验 + 路由分发</text>
<path d="M538,255 L572,255" class="arrow"/>
<text x="555.0" y="245" text-anchor="middle" class="tiny">TaskService 持久化 + 写事件</text>
<path d="M728,305 L762,305" class="arrow"/>
<text x="745.0" y="295" text-anchor="middle" class="tiny">workers/runtime.py 装配上下文</text>
<path d="M918,355 L962,355" class="arrow"/>
<text x="940.0" y="345" text-anchor="middle" class="tiny">LangGraph 决策并请求工具</text>
<path d="M962,410 L918,410" class="arrow dash"/>
<text x="940.0" y="400" text-anchor="middle" class="tiny">ToolRegistry 风险/审批/执行</text>
<path d="M762,505 L538,505" class="arrow"/>
<text x="650.0" y="495" text-anchor="middle" class="tiny">AgentRun + TaskEvent + 日志</text>
<path d="M382,555 L348,555" class="arrow"/>
<text x="365.0" y="545" text-anchor="middle" class="tiny">任务快照 / logs / event cursor</text>
<path d="M192,605 L158,605" class="arrow"/>
<text x="175.0" y="595" text-anchor="middle" class="tiny">HTTP/WS 返回或 LangBot 回推</text>
<rect x="330" y="432" width="760" height="46" class="box orange" rx="12"/>
<text x="710" y="461" text-anchor="middle" class="small">高风险工具、计划确认和人工复核写 checkpoint；批准后由后端恢复执行</text>
</svg>
