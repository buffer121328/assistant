<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="700" viewBox="0 0 1120 700" role="img">
<style>
  .bg { fill: #f8fafc; }
  .title { font: 700 26px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"Noto Sans CJK SC",sans-serif; fill: #0f172a; }
  .label { font: 700 15px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"Noto Sans CJK SC",sans-serif; fill: #0f172a; }
  .small { font: 400 13px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"Noto Sans CJK SC",sans-serif; fill: #334155; }
  .tiny { font: 400 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Arial,"Noto Sans CJK SC",sans-serif; fill: #475569; }
  .blue { stroke: #2563eb; fill: #eff6ff; }
  .green { stroke: #16a34a; fill: #f0fdf4; }
  .orange { stroke: #ea580c; fill: #fff7ed; }
  .purple { stroke: #7c3aed; fill: #f5f3ff; }
  .slate { stroke: #64748b; fill: #f8fafc; }
  .red { stroke: #dc2626; fill: #fef2f2; }
  .box { stroke-width: 1.6; rx: 14; }
  .arrow { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
  .dash { stroke-dasharray: 6 6; }
  .lane { stroke: #cbd5e1; stroke-width: 1.2; stroke-dasharray: 5 5; fill: none; }
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
  </marker>
</defs>
<rect width="100%" height="100%" class="bg"/>
<text x="32" y="44" text-anchor="start" class="title">任务执行时序：任务化、可审批、可恢复</text>
<line x1="70" y1="90" x2="70" y2="670" class="lane"/>
<rect x="-8" y="70" width="156" height="54" class="box slate" rx="14"/>
<text x="70.0" y="98" text-anchor="middle" class="label">用户 / LangBot / Electron</text>
<line x1="260" y1="90" x2="260" y2="670" class="lane"/>
<rect x="182" y="70" width="156" height="54" class="box slate" rx="14"/>
<text x="260.0" y="98" text-anchor="middle" class="label">FastAPI</text>
<line x1="450" y1="90" x2="450" y2="670" class="lane"/>
<rect x="372" y="70" width="156" height="54" class="box slate" rx="14"/>
<text x="450.0" y="98" text-anchor="middle" class="label">Task Service</text>
<line x1="640" y1="90" x2="640" y2="670" class="lane"/>
<rect x="562" y="70" width="156" height="54" class="box slate" rx="14"/>
<text x="640.0" y="98" text-anchor="middle" class="label">Celery Worker</text>
<line x1="830" y1="90" x2="830" y2="670" class="lane"/>
<rect x="752" y="70" width="156" height="54" class="box slate" rx="14"/>
<text x="830.0" y="98" text-anchor="middle" class="label">Agent Runtime</text>
<line x1="1030" y1="90" x2="1030" y2="670" class="lane"/>
<rect x="952" y="70" width="156" height="54" class="box slate" rx="14"/>
<text x="1030.0" y="98" text-anchor="middle" class="label">Tool Governance</text>
<path d="M150,160 L180,160" class="arrow"/>
<text x="165.0" y="150" text-anchor="middle" class="tiny">创建任务 / 续写 / Webhook</text>
<path d="M340,210 L370,210" class="arrow"/>
<text x="355.0" y="200" text-anchor="middle" class="tiny">校验 user_id + 持久化 Task</text>
<path d="M530,260 L560,260" class="arrow"/>
<text x="545.0" y="250" text-anchor="middle" class="tiny">入队 Celery / 写 task.queued</text>
<path d="M720,310 L750,310" class="arrow"/>
<text x="735.0" y="300" text-anchor="middle" class="tiny">装载会话、workspace、profile</text>
<path d="M910,360 L950,360" class="arrow"/>
<text x="930.0" y="350" text-anchor="middle" class="tiny">请求工具：风险分级</text>
<path d="M950,410 L910,410" class="arrow dash"/>
<text x="930.0" y="400" text-anchor="middle" class="tiny">低风险执行或高风险等待审批</text>
<path d="M750,505 L530,505" class="arrow"/>
<text x="640.0" y="495" text-anchor="middle" class="tiny">写 AgentRun / TaskEvent / Result</text>
<path d="M370,555 L340,555" class="arrow"/>
<text x="355.0" y="545" text-anchor="middle" class="tiny">快照、日志、事件游标</text>
<path d="M180,605 L150,605" class="arrow"/>
<text x="165.0" y="595" text-anchor="middle" class="tiny">HTTP/WS 返回 + LangBot 回推</text>
<rect x="330" y="432" width="740" height="46" class="box orange" rx="12"/>
<text x="700" y="461" text-anchor="middle" class="small">审批分支：高风险工具、计划确认和人工复核会写 checkpoint，批准后由后端恢复执行</text>
</svg>
